version: 2

sources:
  - name: celo
    database: dune
    schema: celo
    tables:
      - name: transactions
        description: "Raw Celo transactions table"

  - name: tokens
    database: dune
    schema: tokens
    tables:
      - name: transfers
        description: "Curated multi-chain ERC-20 / ERC-721 / native token transfers with USD pricing. Filter by blockchain = 'celo' for Celo-only data."

  - name: prices
    database: dune
    schema: prices
    tables:
      - name: day
        description: "Daily aggregated USD prices for tokens across chains. Filter by blockchain and contract_address."
