version: 2

models:
  - name: transactions_attributed
    description: "Celo transactions enriched with builder-code attribution parsed from the calldata trailer."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hash
    columns:
      - name: block_time
        description: "Timestamp of the block containing the transaction."
        data_tests:
          - not_null
      - name: block_date
        description: "Date of the block containing the transaction."
        data_tests:
          - not_null
      - name: block_number
        description: "Block height containing the transaction."
        data_tests:
          - not_null
      - name: hash
        description: "Transaction hash. Unique key for this model."
        data_tests:
          - not_null
          - unique
      - name: value
        description: "Native CELO value transferred in the transaction (wei)."
      - name: gas_limit
        description: "Maximum gas the sender was willing to consume."
      - name: gas_price
        description: "Effective gas price paid (legacy or post-1559 effective price)."
      - name: gas_used
        description: "Gas actually consumed by the transaction."
      - name: max_fee_per_gas
        description: "EIP-1559 max fee per gas the sender was willing to pay."
      - name: max_priority_fee_per_gas
        description: "EIP-1559 max priority fee per gas (tip to validator)."
      - name: priority_fee_per_gas
        description: "Effective priority fee per gas paid."
      - name: nonce
        description: "Sender account nonce at time of transaction."
      - name: index
        description: "Position of the transaction within its block."
      - name: success
        description: "Whether the transaction executed successfully."
      - name: '"from"'
        description: "Sender address."
        data_tests:
          - not_null
      - name: to
        description: "Recipient address (null for contract creation)."
      - name: block_hash
        description: "Hash of the block containing the transaction."
      - name: type
        description: "Transaction type (legacy, EIP-1559, EIP-2930, etc.)."
      - name: access_list
        description: "EIP-2930 access list, if provided."
      - name: chain_id
        description: "Chain identifier (Celo mainnet)."
      - name: fee_currency
        description: "Address of the ERC-20 token used to pay gas, if not native CELO."
      - name: has_builder_code
        description: "True when the calldata trailer matches the attribution marker, schema id 0x00, valid code length, and the calldata is long enough to contain the encoded code."
        data_tests:
          - not_null
      - name: builder_code
        description: "UTF-8 decoded builder attribution code extracted from the calldata trailer when has_builder_code is true; NULL otherwise."

  - name: transfers_attributed
    description: "Celo token transfers from tokens.transfers, left-joined to transactions_attributed to attach builder-code attribution at the transfer grain. One row per transfer event; transfers whose parent transaction has no attribution carry has_builder_code = false and builder_code = NULL."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - unique_key
    columns:
      - name: unique_key
        description: "Surrogate key uniquely identifying a transfer event. Unique key for this model."
        data_tests:
          - not_null
          - unique
      - name: blockchain
        description: "Chain of the transfer. Always 'celo' in this model."
        data_tests:
          - not_null
      - name: block_month
        description: "Month of the block containing the transfer."
      - name: block_date
        description: "Date of the block containing the transfer."
        data_tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block containing the transfer."
        data_tests:
          - not_null
      - name: block_number
        description: "Block height containing the transfer."
        data_tests:
          - not_null
      - name: tx_hash
        description: "Hash of the transaction that emitted the transfer. Join key against transactions_attributed.hash."
        data_tests:
          - not_null
      - name: evt_index
        description: "Log event index of the transfer within its transaction."
      - name: trace_address
        description: "Trace address path for internal/native transfers (NULL for log-based transfers)."
      - name: token_standard
        description: "Token standard of the transfer (e.g. erc20, erc721, native)."
      - name: tx_from
        description: "EOA or contract that originated the transaction."
      - name: tx_to
        description: "Direct recipient of the transaction (often the contract being called)."
      - name: tx_index
        description: "Position of the transaction within its block."
      - name: '"from"'
        description: "Sender of the transferred asset."
      - name: '"to"'
        description: "Receiver of the transferred asset."
      - name: contract_address
        description: "Token contract address (NULL for native CELO transfers)."
      - name: symbol
        description: "Token symbol."
      - name: amount_raw
        description: "Raw on-chain transfer amount (token base units)."
      - name: amount
        description: "Display amount, scaled by token decimals."
      - name: price_usd
        description: "USD price used to compute amount_usd at block_time."
      - name: amount_usd
        description: "USD value of the transfer (amount * price_usd)."
      - name: _updated_at
        description: "Timestamp when the source row was last written by Dune."
      - name: has_builder_code
        description: "True when the parent transaction's calldata trailer carried valid builder-code attribution. Defaults to false when no matching transaction is found in transactions_attributed."
        data_tests:
          - not_null
      - name: builder_code
        description: "UTF-8 decoded builder attribution code from the parent transaction; NULL when has_builder_code is false."
