version: 2

models:
  - name: transactions_attributed
    description: "Celo transactions enriched with builder-code attribution parsed from the calldata trailer."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hash
    columns:
      - name: block_time
        description: "Timestamp of the block containing the transaction."
        data_tests:
          - not_null
      - name: block_date
        description: "Date of the block containing the transaction."
        data_tests:
          - not_null
      - name: block_number
        description: "Block height containing the transaction."
        data_tests:
          - not_null
      - name: hash
        description: "Transaction hash. Unique key for this model."
        data_tests:
          - not_null
          - unique
      - name: value
        description: "Native CELO value transferred in the transaction (wei)."
      - name: gas_limit
        description: "Maximum gas the sender was willing to consume."
      - name: gas_price
        description: "Effective gas price paid (legacy or post-1559 effective price)."
      - name: gas_used
        description: "Gas actually consumed by the transaction."
      - name: max_fee_per_gas
        description: "EIP-1559 max fee per gas the sender was willing to pay."
      - name: max_priority_fee_per_gas
        description: "EIP-1559 max priority fee per gas (tip to validator)."
      - name: priority_fee_per_gas
        description: "Effective priority fee per gas paid."
      - name: nonce
        description: "Sender account nonce at time of transaction."
      - name: index
        description: "Position of the transaction within its block."
      - name: success
        description: "Whether the transaction executed successfully."
      - name: '"from"'
        description: "Sender address."
        data_tests:
          - not_null
      - name: to
        description: "Recipient address (null for contract creation)."
      - name: block_hash
        description: "Hash of the block containing the transaction."
      - name: type
        description: "Transaction type (legacy, EIP-1559, EIP-2930, etc.)."
      - name: access_list
        description: "EIP-2930 access list, if provided."
      - name: chain_id
        description: "Chain identifier (Celo mainnet)."
      - name: fee_currency
        description: "Address of the ERC-20 token used to pay gas, if not native CELO."
      - name: has_builder_code
        description: "True when the calldata trailer matches the attribution marker, schema id 0x00, valid code length, and the calldata is long enough to contain the encoded code. Equivalent to multi_code IS NOT NULL."
        data_tests:
          - not_null
      - name: multi_code
        description: "Raw UTF-8 decoded attribution payload extracted from the calldata trailer. May be a single code (e.g. 'minipay') or comma-separated codes (e.g. 'minipay,celo_b057492a'). NULL when has_builder_code is false."
      - name: builder_code
        description: "First comma-delimited segment of multi_code (e.g. 'minipay' from 'minipay,celo_b057492a'). Equal to multi_code when no comma is present. NULL when has_builder_code is false."
      - name: builder_code2
        description: "Second comma-delimited segment of multi_code (e.g. 'celo_b057492a' from 'minipay,celo_b057492a'). NULL when multi_code contains only a single code or has_builder_code is false."

  - name: transfers_attributed
    description: "Celo token transfers from tokens.transfers, left-joined to transactions_attributed to attach builder-code attribution at the transfer grain. One row per transfer event; transfers whose parent transaction has no attribution carry has_builder_code = false and builder_code = NULL."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - unique_key
    columns:
      - name: unique_key
        description: "Surrogate key uniquely identifying a transfer event. Unique key for this model."
        data_tests:
          - not_null
          - unique
      - name: blockchain
        description: "Chain of the transfer. Always 'celo' in this model."
        data_tests:
          - not_null
      - name: block_month
        description: "Month of the block containing the transfer."
      - name: block_date
        description: "Date of the block containing the transfer."
        data_tests:
          - not_null
      - name: block_time
        description: "Timestamp of the block containing the transfer."
        data_tests:
          - not_null
      - name: block_number
        description: "Block height containing the transfer."
        data_tests:
          - not_null
      - name: tx_hash
        description: "Hash of the transaction that emitted the transfer. Join key against transactions_attributed.hash."
        data_tests:
          - not_null
      - name: evt_index
        description: "Log event index of the transfer within its transaction."
      - name: trace_address
        description: "Trace address path for internal/native transfers (NULL for log-based transfers)."
      - name: token_standard
        description: "Token standard of the transfer (e.g. erc20, erc721, native)."
      - name: tx_from
        description: "EOA or contract that originated the transaction."
      - name: tx_to
        description: "Direct recipient of the transaction (often the contract being called)."
      - name: tx_index
        description: "Position of the transaction within its block."
      - name: '"from"'
        description: "Sender of the transferred asset."
      - name: '"to"'
        description: "Receiver of the transferred asset."
      - name: contract_address
        description: "Token contract address (NULL for native CELO transfers)."
      - name: symbol
        description: "Token symbol."
      - name: amount_raw
        description: "Raw on-chain transfer amount (token base units)."
      - name: amount
        description: "Display amount, scaled by token decimals."
      - name: price_usd
        description: "USD price used to compute amount_usd at block_time."
      - name: amount_usd
        description: "USD value of the transfer (amount * price_usd)."
      - name: _updated_at
        description: "Timestamp when the source row was last written by Dune."
      - name: has_builder_code
        description: "True when the parent transaction's calldata trailer carried valid builder-code attribution. Defaults to false when no matching transaction is found in transactions_attributed."
        data_tests:
          - not_null
      - name: multi_code
        description: "Raw UTF-8 attribution payload from the parent transaction (e.g. 'minipay' or 'minipay,celo_b057492a'). NULL when has_builder_code is false."
      - name: builder_code
        description: "First comma-delimited segment of the parent transaction's multi_code (e.g. 'minipay'). NULL when has_builder_code is false."
      - name: builder_code2
        description: "Second comma-delimited segment of the parent transaction's multi_code (e.g. 'celo_b057492a'). NULL when multi_code contains only a single code or has_builder_code is false."

  - name: buildercode_daily_metric
    description: "Daily aggregated metrics per builder code: USD volume, transaction count, unique addresses, and chain fees paid. Built from transfers_attributed joined to celo.transactions for fee data and prices.day for fee-currency USD conversion. One row per (day, builder_code)."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - day
              - builder_code
    columns:
      - name: day
        description: "Day bucket (DATE_TRUNC of block_time)."
        data_tests:
          - not_null
      - name: builder_code
        description: "Attribution code. Resolved as COALESCE(NULLIF(builder_code2, ''), builder_code) from transfers_attributed — i.e. the more specific code wins when a transaction carries a compound payload like 'minipay,celo_b057492a'."
        data_tests:
          - not_null
      - name: volume_usd
        description: "Sum of amount_usd across all attributed transfers in the day. Zero when the builder had attributed transactions but none produced a token transfer."
      - name: tx_count
        description: "Distinct attributed transactions in the day for this builder, derived from transactions_attributed. Includes transactions that did not produce any token transfer (e.g. approve(), updateProfile, governance writes, reverts)."
      - name: token_transfers_tx
        description: "Distinct attributed transactions in the day that produced at least one row in tokens.transfers. Always ≤ tx_count; the difference is the number of attributed transactions that did not emit a Transfer event."
      - name: unique_addresses
        description: "Distinct user EOAs that originated an attributed transaction for this builder on this day, derived from transactions_attributed.from (the tx signer). Same population as tx_count, so it includes users who did approves, governance writes, or other non-transfer interactions in addition to those who moved value. Counting the tx signer (not the transfer event's from) also avoids the false-positive case where a router contract's address would be counted instead of the actual user when a tx routes through a swap/batch contract."
      - name: chain_fees_usd
        description: "Total gas fees paid in USD across ALL attributed transactions for this builder on this day, regardless of whether the transaction produced a token transfer. Same scope as tx_count, so this is the true cost-per-builder metric (includes approves, reverts, governance writes, and other non-transfer interactions). Computed as gas_used * gas_price * fee-currency-USD-price. fee_currency adapters for USDC (0x2f25…) and USDT (0x0e2a…) are mapped to their underlying token addresses for price lookup; NULL or zero-address fee_currency is priced as native CELO; any other fee_currency is priced directly against its own contract_address in prices.day. Contribution rounds to zero when no matching price row exists for the day (e.g. unindexed token)."
